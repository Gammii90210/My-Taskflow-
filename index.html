<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- ── HEADER ── -->
  <header>
    <div class="brand">
      <div class="brand-mark">T</div>
      <div class="brand-text">
        <span class="brand-name">TaskFlow</span>
        <span class="brand-tagline">Personal task manager</span>
      </div>
    </div>
    <div class="header-counters">
      <div class="counter">
        <span class="counter-val" id="stat-total">0</span>
        <span class="counter-key">Total</span>
      </div>
      <div class="counter-divider"></div>
      <div class="counter">
        <span class="counter-val accent" id="stat-active">0</span>
        <span class="counter-key">Active</span>
      </div>
      <div class="counter-divider"></div>
      <div class="counter">
        <span class="counter-val green" id="stat-done">0</span>
        <span class="counter-key">Done</span>
      </div>
    </div>
  </header>

  <!-- ── PAGE WRAPPER ── -->
  <div class="page">

    <!-- ── ADD TASK FORM ── -->
    <section class="form-section">
      <h1 class="page-heading">My Tasks</h1>
      <div class="add-card">
        <div class="input-row">
          <input
            type="text"
            id="task-input"
            class="task-input"
            placeholder="What needs to be done?"
            maxlength="120"
            autocomplete="off"
          />
          <select id="priority-select" class="priority-select">
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
          <button class="btn-primary" onclick="addTask()">Add Task</button>
        </div>
        <div class="desc-row">
          <textarea
            id="desc-input"
            class="desc-input"
            placeholder="Add a note or description (optional)"
            rows="2"
          ></textarea>
        </div>
      </div>
    </section>

    <!-- ── PROGRESS ── -->
    <section class="progress-section">
      <div class="progress-meta">
        <span class="progress-label">Completion</span>
        <span class="progress-value" id="progress-text">0 of 0 tasks done</span>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="progress-bar" style="width: 0%"></div>
      </div>
    </section>

    <!-- ── FILTERS ── -->
    <section class="filter-section">
      <div class="filter-tabs">
        <button class="tab active" onclick="setFilter('all', this)">All</button>
        <button class="tab"        onclick="setFilter('active', this)">Active</button>
        <button class="tab"        onclick="setFilter('completed', this)">Completed</button>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/>
          <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search tasks…"
          oninput="renderTasks()"
        />
      </div>
    </section>

    <!-- ── TASK LIST ── -->
    <section class="list-section">
      <ul id="task-list"></ul>
      <div class="empty-state" id="empty-state" style="display: none;">
        <div class="empty-icon">
          <svg viewBox="0 0 48 48" fill="none">
            <rect x="8" y="12" width="32" height="28" rx="4" stroke="currentColor" stroke-width="1.5"/>
            <path d="M16 8h16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <path d="M17 24h14M17 31h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <p class="empty-title">No tasks here</p>
        <p class="empty-sub">Add one above to get started</p>
      </div>
    </section>

    <!-- ── BOTTOM BAR ── -->
    <div class="bottom-bar">
      <span class="items-left" id="task-count"></span>
      <button class="btn-clear" id="clear-btn" onclick="clearCompleted()">
        Clear completed
      </button>
    </div>

  </div><!-- end .page -->

  <!-- ── TOAST ── -->
  <div id="toast" class="toast"></div>

  <script src="app.js"></script>
</body>
</html>
